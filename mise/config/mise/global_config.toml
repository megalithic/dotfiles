"brew:apfel" = "latest"        # Apple Intelligence CLI/server — shade-next compact_ai interpreter
"brew:autoconf" = "latest"
"brew:automake" = "latest"
"brew:bash" = "latest"
"brew:btop" = "latest"
"brew:cmark-gfm" = "latest"
"brew:codespell" = "latest"
"brew:coreutils" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:gcc" = "latest"
"brew:git" = "latest"
"brew:gnu-sed" = "latest"
"brew:gnupg" = "latest"
"brew:grep" = "latest"
"brew:herdr" = "latest"
"brew:kanata" = "latest"       # keyboard remapper; setup task copies it to stable /usr/local/bin/kanata
"brew:mas" = "latest"
"brew:mole" = "latest"
"brew:mosh" = "latest"
"brew:openssl@3" = "latest"    # required by Python (ssl module) and networking Rust crates
"brew:pgcli" = "latest"
"brew:pinentry-mac" = "latest"
"brew:pkgconf" = "latest"      # helps compilers locate openssl and other libs when building from source
"brew:poppler" = "latest"      # pdftotext etc. — pi wrapper expects poppler-utils on PATH
"brew:renameutils" = "latest"
"brew:ripgrep" = "latest"
"brew:tree" = "latest"
"brew:wxwidgets" = "latest"
"brew:zsh" = "latest"

"mas:497799835" = "latest"  # Xcode
"mas:975937182" = "latest"  # Fantastical
"mas:1236045954" = "latest" # Canary

"brew-cask:1password" = "latest"
"brew-cask:colorsnapper" = "latest"
"brew-cask:contexts" = "latest"
"brew-cask:discord" = "latest"
"brew-cask:ghostty@tip" = "latest"
"brew-cask:handy" = "latest"
"brew-cask:hammerspoon" = "latest"
"brew-cask:meetingbar" = "latest"
"brew-cask:proton-drive" = "latest"
"brew-cask:protonvpn" = "latest"
"brew-cask:raycast" = "latest"
