[dotfiles]
# "~/.config" = "~/.dotfiles/mise/config"

# -- pi coding agent: managed subset of ~/.pi/agent; runtime state (sessions/,
#    npm/, auth.json, settings.json) stays unmanaged. settings.json is merged
#    by `mise run setup:pi`, not linked. --
"~/.pi/agent/AGENTS.md" = "~/.dotfiles/mise/config/pi-coding-agent/agent/AGENTS.md"
"~/.pi/agent/APPEND_SYSTEM.md" = "~/.dotfiles/mise/config/pi-coding-agent/agent/APPEND_SYSTEM.md"
"~/.pi/agent/keybindings.json" = "~/.dotfiles/mise/config/pi-coding-agent/agent/keybindings.json"
"~/.pi/agent/models.json" = "~/.dotfiles/mise/config/pi-coding-agent/agent/models.json"
"~/.pi/agent/mcp.json" = "~/.dotfiles/mise/config/pi-coding-agent/agent/mcp.json"
"~/.pi/agent/extensions" = { source = "~/.dotfiles/mise/config/pi-coding-agent/agent/extensions", mode = "symlink-each" }
"~/.pi/agent/skills" = { source = "~/.dotfiles/mise/config/pi-coding-agent/agent/skills", mode = "symlink-each" }
"~/.pi/agent/prompts" = { source = "~/.dotfiles/mise/config/pi-coding-agent/agent/prompts", mode = "symlink-each" }
"~/.pi/agent/agents" = { source = "~/.dotfiles/mise/config/pi-coding-agent/agent/agents", mode = "symlink-each" }
"~/.local/bin/pi" = "~/.dotfiles/mise/config/pi-coding-agent/bin/pi"
"~/.local/bin/pinvim" = "~/.dotfiles/mise/config/pi-coding-agent/bin/pinvim"
"~/.local/bin/p" = "~/.dotfiles/mise/config/pi-coding-agent/bin/p"
"~/.local/bin/pview" = "~/.dotfiles/mise/config/pi-coding-agent/bin/pview"
"~/.local/bin/pi-acp" = "~/.dotfiles/mise/config/pi-coding-agent/bin/pi-acp"
"~/.local/bin/work-tickets" = "~/.dotfiles/mise/config/pi-coding-agent/bin/work-tickets"
# "~/Library/Developer/Xcode/UserData/FontAndColorThemes/tokyo-night.xccolortheme" = ".config/xcode/tokyo-night.xccolortheme"
"~/.config/mise/config.toml" = "~/.dotfiles/mise/config/mise/global_config.toml"
"~/.config/atuin/config.toml" = "~/.dotfiles/mise/config/atuin/config.toml"
"~/.config/fnox/config.toml" = "~/.dotfiles/mise/config/fnox/config.toml"
"~/.config/fish" = "~/.dotfiles/mise/config/fish"
"~/.profile" = "~/.dotfiles/mise/config/bash/profile"
"~/.bashrc" = "~/.dotfiles/mise/config/bash/bashrc"
"~/.bash_profile" = "~/.dotfiles/mise/config/bash/bash_profile"
"~/.zshrc" = "~/.dotfiles/mise/config/zsh/zshrc"
"~/.zprofile" = "~/.dotfiles/mise/config/zsh/zprofile"
"~/.config/fzf" = "~/.dotfiles/mise/config/fzf"
"~/.config/jj/config.toml" = "~/.dotfiles/mise/config/jj/config.toml"
# worktrunk: per-file — approvals.toml{,.lock} in the same dir are mutable runtime state
"~/.config/worktrunk/config.toml" = "~/.dotfiles/mise/config/worktrunk/config.toml"
"~/.config/ghostty" = "~/.dotfiles/mise/config/ghostty"
"~/.config/hammerspoon" = "~/.dotfiles/mise/config/hammerspoon"
"~/.config/kitty" = "~/.dotfiles/mise/config/kitty"
"~/.config/nvim" = "~/.dotfiles/mise/config/nvim"
"~/.config/tmux" = "~/.dotfiles/mise/config/tmux"

# -- generated fragments → committed static files (replaces Home Manager Nix interpolation) --
# "~/.local/share/hammerspoon/nix_path.lua" = "~/.dotfiles/mise/fragments/hammerspoon/nix_path.lua"
# "~/.local/share/hammerspoon/fragments/shade-next.lua" = "~/.dotfiles/mise/fragments/hammerspoon/shade-next.lua"
# "~/.local/share/tmux/nix.conf" = "~/.dotfiles/mise/fragments/tmux/nix.conf"
# Mirror of the nix-generated shade-next config (home/common/programs/shade-next).
# Keep mise/config/shade-next/config.toml in sync with the nix module output;
# uncomment when mise (not Home Manager) owns ~/.config/shade-next.
# "~/.config/shade-next/config.toml" = "~/.dotfiles/mise/config/shade-next/config.toml"
"~/.config/sesame/config.jsonc" = { source = "~/.dotfiles/mise/fragments/sesame/config.jsonc", mode = "template" }
# "~/.config/process-compose/shortcuts.yaml" = "~/.dotfiles/mise/fragments/process-compose/shortcuts.yaml"
# "~/.config/process-compose/theme.yaml" = "~/.dotfiles/mise/fragments/process-compose/theme.yaml"

# -- kanata: individual .kbd files (parent dir has mutable state; active kanata.kbd is mutable) --
"~/.config/kanata/macbook.kbd" = "~/.dotfiles/config/kanata/macbook.kbd"
"~/.config/kanata/macbook-disabled.kbd" = "~/.dotfiles/config/kanata/macbook-disabled.kbd"
"~/.config/kanata/icons" = "~/.dotfiles/config/kanata/icons"

# -- SSH: individual files (directory holds mutable keys/known_hosts) --
"~/.ssh/config" = "~/.dotfiles/config/ssh/config"
"~/.ssh/allowed_signers" = "~/.dotfiles/mise/config/ssh/allowed_signers"
# 1Password SSH agent key selection (vault/item); GUI+CLI come from the
# brew casks in [bootstrap.packages], replacing nix-darwin's _1password module.
"~/.config/1Password/ssh/agent.toml" = "~/.dotfiles/mise/config/1password/agent.toml"

# -- espanso: app support path, not XDG config (validated repo-final link chain) --
"~/Library/Application Support/espanso" = "~/.dotfiles/config/espanso"

# -- git: XDG-native; single merged config, ignore is git's default excludes path.
#    No ~/.gitconfig or ~/.gitignore in the mise world (HM-era split collapsed).
#    NOTE: while nix still owns ~/.gitconfig it wins per-key over the XDG file;
#    values are identical today — mirror edits until the HM git module is dropped. --
"~/.config/git/config" = "~/.dotfiles/mise/config/git/config"
"~/.config/git/ignore" = "~/.dotfiles/mise/config/git/ignore"
"~/.ignore" = "~/.dotfiles/mise/config/git/tool-ignore"

# -- static tool configs (small, single-file configs previously Nix-store-backed) --
"~/.config/bat/config" = "~/.dotfiles/mise/config/bat/config"
# bat theme/syntax referenced by config (--theme=everforest, ghostty map-syntax);
# run `bat cache --build` if these change
"~/.config/bat/themes/everforest.tmTheme" = "~/.dotfiles/mise/config/bat/themes/everforest.tmTheme"
"~/.config/bat/syntaxes/ghostty.sublime-syntax" = "~/.dotfiles/mise/config/bat/syntaxes/ghostty.sublime-syntax"
"~/.config/direnv/direnv.toml" = "~/.dotfiles/mise/config/direnv/direnv.toml"
"~/.config/starship.toml" = "~/.dotfiles/mise/config/starship/starship.toml"
"~/.config/karabiner/karabiner.json" = "~/.dotfiles/mise/config/karabiner/karabiner.json"
"~/.config/eza/theme.yml" = "~/.dotfiles/mise/config/eza/theme.yml"
"~/.config/ripgrep/rc" = "~/.dotfiles/mise/config/ripgrep/rc"
"~/.config/ripgrep/ignore" = "~/.dotfiles/mise/config/fd/ignore"

# -- symlink-each targets (existing mutable dirs, needs per-entry reconciliation) --
"~/.local/bin" = { source = "~/.dotfiles/bin", mode = "symlink-each" }
"~/bin" = { source = "~/.dotfiles/bin", mode = "symlink-each" }


