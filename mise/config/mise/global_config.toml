# Mirrored into the VM at ~/.config/mise/config.toml during provisioning.
# Keep roughly in sync with your host ~/.config/mise/config.toml.

# Shared env vars — `mise activate` exports these identically in bash, zsh, and
# fish. Replaces nix-darwin's hosts/common.nix environment.variables.
# Caveat: GUI/launchd apps don't inherit them (same as the nix setup).
[env]
EDITOR = "nvim"
VISUAL = "nvim"
GIT_EDITOR = "nvim"
JJ_EDITOR = "nvim"
MANPAGER = "nvim +Man!"

# Cross-shell aliases. mise renders these for bash, fish, zsh, and xonsh
# through `mise activate` / `mise hook-env`.
[shell_alias]
ls = "eza --all --group-directories-first --color=always --hyperlink"
l = "eza --all --long --color=always --color-scale=all --group-directories-first --sort=type --hyperlink --icons=always --octal-permissions"
ll = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
la = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
tree = "eza --tree --color=always"
rm = "trash -v"
q = "exit"
",q" = "exit"
":q" = "exit"
":Q" = "exit"
":e" = "nvim"
mega = "ftm mega"
copy = "pbcopy"
paste = "pbpaste"
cat = "bat"
pic = "pi -c"
pir = "pi -r"
pisock = "pinvim"
pis = "pinvim"

[tools]
atuin = "latest"
bat = "latest"
delta = "latest"
duckdb = "latest"
fzf = "latest"
github-cli = "latest"
lazydocker = "latest"
node = "latest"
pnpm = "10"
tmux = "latest"
fd = "latest"
