# Mirrored into the VM at ~/.config/mise/config.toml during provisioning.
# Keep roughly in sync with your host ~/.config/mise/config.toml.

# Shared env vars — `mise activate` exports these identically in bash, zsh, and
# fish. Replaces nix-darwin's hosts/common.nix environment.variables.
# Caveat: GUI/launchd apps don't inherit them (same as the nix setup).
[env]
EDITOR = "nvim -O"
VISUAL = "nvim -O"
GIT_EDITOR = "nvim -O"
JJ_EDITOR = "nvim -O"
MANPAGER = "nvim +Man!"

# Cross-shell aliases. mise renders these for bash, fish, zsh, and xonsh
# through `mise activate` / `mise hook-env`.
[shell_alias]
ls = "eza --all --group-directories-first --color=always --hyperlink"
l = "eza --all --long --color=always --color-scale=all --group-directories-first --sort=type --hyperlink --icons=always --octal-permissions"
ll = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
la = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
tree = "eza --tree --color=always"
rm = "trash -v"
q = "exit"
",q" = "exit"
":q" = "exit"
":Q" = "exit"
":e" = "nvim"
mega = "ftm mega"
copy = "pbcopy"
paste = "pbpaste"
cat = "bat"
pic = "pi -c"
pir = "pi -r"
pisock = "pinvim"
pis = "pinvim"

# Global tasks: copy project templates from mise/config/mise/tmpls/ into a
# project's .config/ dir. Run from a project root: `mise run gen:shopify`,
# `mise run gen:elixir -- /path/to/project`, or `mise run gen:wt-elixir` for
# Worktrunk's .config/wt.toml. Script lives in repo bin/ (linked onto PATH).
# Duplicated in home/common/programs/mise/default.nix globalConfig (nix twin).
[tasks."gen:elixir"]
description = "Copy the elixir mise template + scripts to [target-dir]/.config/ (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen elixir"

[tasks."gen:shopify"]
description = "Copy the shopify mise template + scripts to [target-dir]/.config/ (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen shopify"

[tasks."gen:wt-elixir"]
description = "Copy the elixir Worktrunk template + scripts to [target-dir]/.config/wt.toml (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen wt.elixir"

[tasks."gen:wt-shopify"]
description = "Copy the shopify Worktrunk template + scripts to [target-dir]/.config/wt.toml (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen wt.shopify"

[tools]
atuin = "latest"
bat = "latest"
delta = "latest"
duckdb = "latest"
fzf = "latest"
github-cli = "latest"
lazydocker = "latest"
node = "latest"
pnpm = "10"
tmux = "latest"
sqlite = "latest"
fd = "latest"
