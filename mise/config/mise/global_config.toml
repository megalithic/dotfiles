#:tombi schema.strict = false

# Useful mise-based dotfiles repos and patterns:
#
# REFS:
# https://github.com/kryota-dev/dotfiles - uses tart and macos vms to test mise bootstrap runs
# https://github.com/sedalu/dotfiles - auto-env based on machine name, not just arch/os; and container based install :mindblown:
# https://github.com/AllySummers/dotfiles - hk, pkl, usage releated stuff, too
# https://github.com/hashiiiii/dotfiles
# https://github.com/disrupted/dotfiles/blob/master/.config/mise/config.toml - tools i typically use
# https://github.com/JJGadgets/Biohazard/blob/main/.mise.toml - lots of aqua use
# https://github.com/disrupted/dotfiles/blob/master/.config/mise/config.toml - elixir related
# https://github.com/AxlAlm/neovim-setup/blob/master/mise/README.md - language mise configs (not tmpl, manual cp)
# https://github.com/mfilej/dotfiles/blob/main/README.md - perhaps a more simplified and less bespoke script version of bootstraping with mise (also an elixirist)
# https://github.com/leandrocp/dotfiles/tree/master/config/mise - well known elixirist that uses mise/pi/nvim/zed/etc

[settings]
experimental = true
dotfiles.root = "~/.dotfiles"
auto_install = true
env_shell_expand = true

# quiet = true
# verbose = false

activate_aggressive = true
cargo.binstall = true
color_theme = "everforest"
github.use_git_credentials = true
lockfile = true
minimum_release_age = "1d"
npm.package_manager = "aube"
system_packages.managers = ["brew", "brew-cask"]
pin = true
pipx.uvx = true
task.monorepo_depth = 2

[settings.status]
show_env = true
show_tools = true

[deps.aube]
auto = true

[env]
HK_MISE = "1"
HK_HIDE_WHEN_DONE = "true"
MISE_EXPERIMENTAL = "1"
DOTS = "{{env.HOME}}/.dotfiles"
DOTFILES_DIR = "{{env.HOME}}/.dotfiles"
CODE = "{{env.HOME}}/code"
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
XDG_DATA_HOME = "{{env.HOME}}/.local/share"
XDG_STATE_HOME = "{{env.HOME}}/.local/state"
XDG_CACHE_HOME = "{{env.HOME}}/.cache"
PI_STATE_DIR = "{{env.HOME}}/.local/state/pi"
HOMEBREW_GITHUB_API_TOKEN = '{{ exec(command="if [ -f ~/.config/fnox/secrets/env-vars.sh ]; then . ~/.config/fnox/secrets/env-vars.sh; elif [ -f ~/.config/opnix/secrets/env-vars.sh ]; then . ~/.config/opnix/secrets/env-vars.sh; fi; printf %s $HOMEBREW_GITHUB_API_TOKEN") }}'
EDITOR = "nvim -O"
VISUAL = "nvim -O"
GIT_EDITOR = "nvim -O"
JJ_EDITOR = "nvim -O"
MANPAGER = "nvim +Man!"

[env._]
path = [
  "/opt/homebrew/opt/coreutils/libexec/gnubin",
  "/opt/homebrew/opt/gnupg/bin",
  "/opt/homebrew/opt/gnu-sed/libexec/gnubin",
  "/opt/homebrew/opt/grep/libexec/gnubin",
  "/opt/homebrew/opt/openjdk/bin",
  "$HOME/.bin",
  "$HOME/.local/bin",
  "./bin",
  "$HOME/.fly/bin",
  "$HOME/.cargo/bin",
  "/Applications/Postgres.app/Contents/Versions/latest/bin",
  "$HOME/.opencode/bin",
]

[shell_alias]
"...." = "cd ../../.."
"..." = "cd ../.."
".." = "cd .."
ls = "eza --all --group-directories-first --color=always --hyperlink"
l = "eza --all --long --color=always --color-scale=all --group-directories-first --sort=type --hyperlink --icons=always --octal-permissions"
ll = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
la = "eza -lahF --group-directories-first --color=always --icons=always --hyperlink"
tree = "eza --tree --color=always"
rm = "trash -v"
q = "exit"
",q" = "exit"
":q" = "exit"
":Q" = "exit"
":e" = "nvim"
dns_reset = "dscacheutil -flushcache && killall -HUP mDNSResponder"
mega = "ftm mega"
copy = "pbcopy"
paste = "pbpaste"
cat = "bat"
pic = "pi -c"
pir = "pi -r"
pisock = "pinvim"
pis = "pinvim"
up = "cd $HOME/.dotfiles && mise run up"

# (no [bootstrap.brew.taps]: helium installs via setup:helium:install in the
# bootstrap task — direct GitHub releases download, no tap; brew taps are
# read-only under nix-homebrew anyway)

