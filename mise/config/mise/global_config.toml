# espanso LaunchAgent plist is written by the post-packages hook
# (mise/tasks/espanso-service), not by mise's launchd-agents step.
# It is not loaded during clean bootstrap because first app launch triggers a
# Gatekeeper GUI prompt; start it manually after approving Espanso.

[bootstrap.macos.launchd.agents."com.megadots.llama-cpp"]
program = "~/.dotfiles/mise/tasks/llama-server-launchd"
run_at_load = true
keep_alive = true
stdout_path = "~/Library/Logs/llama-cpp/stdout.log"
stderr_path = "~/Library/Logs/llama-cpp/stderr.log"

[bootstrap.macos.launchd.agents."com.megadots.sesame-session-indexer"]
program = "~/.dotfiles/mise/config/pi-coding-agent/scripts/sesame-session-indexer"
args = ["watch", "--interval", "30"]
run_at_load = true
keep_alive = true
stdout_path = "~/.cache/sesame-session-indexer.log"
stderr_path = "~/.cache/sesame-session-indexer.log"

[bootstrap.macos.launchd.agents."com.megadots.pi-session-indexer"]
program = "~/.dotfiles/mise/config/pi-coding-agent/scripts/pi-session-indexer"
run_at_load = true
start_interval = 7200
stdout_path = "~/.cache/pi-session-indexer.log"
stderr_path = "~/.cache/pi-session-indexer.log"

# media-presence: meeting/AV presence daemon (bin/media-presenced, single-file
# swift script, no build step). Defaults match the nix agent's args
# (--socket ~/.local/state/media-presence/sock --cdp-port 9223).
[bootstrap.macos.launchd.agents."com.megadots.media-presenced"]
program = "~/.dotfiles/bin/media-presenced"
run_at_load = true
keep_alive = true
stdout_path = "~/Library/Logs/media-presence/stdout.log"
stderr_path = "~/Library/Logs/media-presence/stderr.log"

# miccheck: menubar push-to-talk/push-to-mute app (bin/miccheck.swift).
# Wrapper checks the compiled binary exists (built by `mise run setup:miccheck`).
[bootstrap.macos.launchd.agents."com.megadots.miccheck"]
program = "~/.dotfiles/bin/miccheck-launchd"
run_at_load = true
keep_alive = true
stdout_path = "~/Library/Logs/miccheck/stdout.log"
stderr_path = "~/Library/Logs/miccheck/stderr.log"

# kanata daemon is managed by brew services (post-tools hook, `brew services
# start kanata`), not mise launchd. brew formula owns the service plist.

[bootstrap.macos.launchd.agents."com.kanata-bar.ui"]
program = "~/.dotfiles/mise/tasks/kanata-bar-launchd"
run_at_load = true
keep_alive = false
stdout_path = "/tmp/kanata-bar.log"
stderr_path = "/tmp/kanata-bar.err"

[bootstrap.hooks.post-packages]
# Casks mise's brew-cask backend can't handle, installed via real brew:
# - 1password-cli, hammerspoon: ship `binary` artifacts (backend is app-bundle only)
# (helium is NOT here: it needs the GitHub token, which needs op signin +
#  fnox render — see [tasks.bootstrap] for the ordered chain)
# hooks: no template expansion, cwd = config root, [env] not applied
run = [
  "command -v op >/dev/null 2>&1 || HOMEBREW_NO_ANALYTICS=1 HOMEBREW_NO_ENV_HINTS=1 brew install --cask 1password-cli",
  "[ -d /Applications/Hammerspoon.app ] || HOMEBREW_NO_ANALYTICS=1 HOMEBREW_NO_ENV_HINTS=1 brew install --cask hammerspoon",
  "[ -d /Applications/Espanso.app ] || HOMEBREW_NO_ANALYTICS=1 HOMEBREW_NO_ENV_HINTS=1 brew install --cask espanso",
  "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/espanso-service",
]

[bootstrap.hooks.post-defaults]
run = "killall Finder SystemUIServer Dock || true"

[bootstrap.hooks.post-tools]
run = [
  "brew services start kanata 2>/dev/null || true",
  "mise run setup:kanata",
]

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Runs at step 8 of `mise bootstrap`, after [tools] (fnox available) and after
# post-packages installed 1Password + op. Secrets chain, in order:
# op signin (interactive gate) -> fnox render -> helium install (needs the
# rendered HOMEBREW_GITHUB_API_TOKEN for the private releases repo).
[tasks.bootstrap]
run = [
  "command -v pre-commit >/dev/null 2>&1 && pre-commit install --install-hooks || true",
  "mise install --locked fnox",
  "mise run setup:op:signin",
  "mise run setup:fnox:render",
  "mise run setup:helium:install",
]

[tasks.doctor]
description = "Post-bootstrap health checks (bootstrap.sh runs this last)"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/doctor"

# -- setup:* namespace: bootstrap/provisioning tasks. Old names kept as
#    aliases so existing docs/scripts/muscle memory keep working. --

[tasks."setup:fnox:render"]
alias = "fnox:render"
description = "Render fnox file-shaped secrets (env-vars.sh) to ~/.config/fnox/secrets"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/fnox-render-secrets"

[tasks."setup:op:signin"]
alias = "op:signin"
description = "Interactive gate: wait until the 1Password CLI (op) is signed in with app integration"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/op-signin-gate"

[tasks."setup:helium:install"]
alias = "helium:install"
description = "Install Helium.app from the private releases repo (GitHub API download + sha256 verify)"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/install-helium"

[tasks."setup:pi"]
alias = "pi:setup"
description = "Idempotent pi agent setup: pinned tools, settings merge, pi-acp build, extension seed"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/config/pi-coding-agent/scripts/setup"

[tasks."setup:kanata"]
alias = "kanata:setup"
description = "Install/activate Karabiner VirtualHID glue and restart mise-managed kanata services"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/mise/tasks/kanata-setup"

[tasks."setup:miccheck"]
alias = "miccheck:setup"
description = "Compile bin/miccheck.swift to ~/.local/bin/miccheckd (push-to-talk menubar app)"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/bin/miccheck-build"

# checker, not setup — stays outside the namespace
[tasks."helium:1password-trust"]
description = "Check 1Password trusts /Applications/Helium.app; prints GUI Add Browser steps if not (setting is tamper-protected, not writable)"
run = "${DOTFILES_DIR:-$HOME/.dotfiles}/bin/helium-1password-trust"

# Global tasks: copy project templates from mise/config/mise/tmpls/ into a
# project's .config/ dir. Run from a project root: `mise run gen:shopify`,
# `mise run gen:elixir -- /path/to/project`, or `mise run gen:wt-elixir` for
# Worktrunk's .config/wt.toml. Template helper lives in repo bin/ (linked onto PATH).
# Duplicated in home/common/programs/mise/default.nix globalConfig (nix twin).
[tasks."gen:elixir"]
description = "Copy the elixir mise template + scripts to [target-dir]/.config/ (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen elixir"

[tasks."gen:shopify"]
description = "Copy the shopify mise template + scripts to [target-dir]/.config/ (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen shopify"

[tasks."gen:wt-elixir"]
description = "Copy the elixir Worktrunk template + scripts to [target-dir]/.config/wt.toml (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen wt.elixir"

[tasks."gen:wt-shopify"]
description = "Copy the shopify Worktrunk template + scripts to [target-dir]/.config/wt.toml (default: cwd)"
dir = "{{cwd}}"
run = "mise-tmpl-gen wt.shopify"

