[env]
# ── Shared postgres: ONE instance, hosted in the main repo ─────────────
# .worktreeinclude copies this file into each worktree, so anchor paths to
# the MAIN repo root via git-common-dir (not config_root, which would point
# at the worktree). `./tmp/` is already gitignored.
HOST = { default = "127.0.0.1" }
PG_ROOT = "{{ exec(command='git rev-parse --path-format=absolute --git-common-dir') | trim | dirname }}/tmp/pg"
PGHOST = "{{ env.PG_ROOT }}"                                                                                    # unix socket dir (psql/pg_ctl use this)
PGPORT = { default = "5432" }                                                                                   # respect pre-set PGPORT, else 5432; dev.exs + test.exs read this, Ecto via localhost TCP
PG_LOG = "{{ env.PG_ROOT }}/postgres.log"
PGDATA = "{{ env.PG_ROOT }}/data"

# ── GIT_WORKTREE ─────────────────────────────────────────────────────────
# Respects a pre-set GIT_WORKTREE (wt.fish exports the raw branch name).
# Otherwise derives "{repo-name}-{branch-slug}" when inside a linked git
# worktree (slug = branch with non [A-Za-z0-9_] squashed to "-").
# Main repo checkout → empty (config/dev.exs treats nil/"" as no worktree).
GIT_WORKTREE = """{{ exec(command='
cd "' ~ cwd ~ '" 2>/dev/null || true
if [ -n "${GIT_WORKTREE:-}" ]; then printf "%s" "$GIT_WORKTREE"; exit 0; fi
gd="$(git rev-parse --git-dir 2>/dev/null)" || exit 0
case "$gd" in */worktrees/*) ;; *) exit 0 ;; esac
repo="$(basename "$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")")"
br="$(git branch --show-current 2>/dev/null)"
[ -n "$br" ] || br="$(basename "$PWD")"
slug="$(printf "%s" "$br" | tr -c "A-Za-z0-9_" "-" | sed -e "s/--*/-/g" -e "s/^-//" -e "s/-*$//")"
printf "%s-%s" "$repo" "$slug"
') }}"""

# ── Phoenix port ────────────────────────────────────────────────────────
# Resolved by .local/bin/phx-port (generated by `mise run bootstrap:phx-port`):
#   1. $PORT override (config/dev.exs reads PORT first)
#   2. running beam process with cwd == project root (lowest listening port)
#   3. deterministic: 4000 + :erlang.phash2(GIT_WORKTREE, 1000), cached in
#      .local/cache/ (mirrors worktree_port_offset in config/dev.exs)
# Falls back to 4000 until the bootstrap task has generated the script.
# cwd-anchored (git toplevel), NOT config_root: worktrees nested under the
# main repo load BOTH mise.local.toml copies and the ancestor's evaluates
# first — the script must resolve against the checkout being entered.
PHX_PORT = { default = "{{ exec(command='cd \"' ~ cwd ~ '\" 2>/dev/null; t=\"$(git rev-parse --show-toplevel 2>/dev/null)\"; s=\"${t:-.}/.local/bin/phx-port\"; [ -x \"$s\" ] || s=\"' ~ config_root ~ '/.local/bin/phx-port\"; bash \"$s\" 2>/dev/null || echo 4000') }}" }

[tools]
# Precompiled postgres from github.com/theseus-rs/postgresql-binaries
# (macOS arm64 + Linux + Windows, sha256-verified; majors 13–18 available).
# extract_all: unpack the whole distribution (bin/ lib/ share/ include/);
# bin_path: without it, PATH would point at the archive root instead of bin/.
"ubi:theseus-rs/postgresql-binaries" = { version = "18.4.0", extract_all = "true", bin_path = "bin" }
expert = "0.1.5"
jq = "latest"                                                                                         # bootstrap:pi merges tidewave into .pi/mcp.json

[tasks.preflight]
description = "Preflight project setup"
shell = "bash -c"
run = '''
mise trust
mise install
mise run bootstrap
mise run start:db
'''

[tasks.bootstrap]
description = "Bootstrap local agent tooling (.local/bin/phx-port + .pi dir)"
depends = ["bootstrap:phx-port", "bootstrap:pi"]

[tasks."bootstrap:phx-port"]
description = "Generate .local/bin/phx-port (PHX_PORT resolver)"
shell = "bash -c"
run = '''
set -euo pipefail
mkdir -p .local/bin .local/cache
cat > .local/bin/phx-port <<'PHXPORT'
#!/usr/bin/env bash
# Generated by `mise run bootstrap:phx-port` — do not edit by hand.
# Resolves the Phoenix dev port, mirroring config/dev.exs:
#   port: String.to_integer(System.get_env("PORT") || "#{4000 + worktree_port_offset}")
#   worktree_port_offset = :erlang.phash2(GIT_WORKTREE, 1000)
set -euo pipefail
# Root = git toplevel of the CALLER's cwd (worktree-aware — the main repo's
# script may be invoked for a nested worktree). Script location is fallback.
root="$(git rev-parse --show-toplevel 2>/dev/null || true)"
[ -n "$root" ] || root="$(cd "$(dirname "$0")/../.." && pwd)"
base=4000 # RxWeb.Endpoint http :port base in config/dev.exs

# 1. explicit override wins (dev.exs reads PORT first)
if [ -n "${PORT:-}" ]; then
  echo "$PORT"
  exit 0
fi

# 2. running server: beam process whose cwd is this checkout. Lowest
#    listening TCP port is Phoenix (4000+off < live_debugger 4008+off
#    < erlang distribution ports).
for pid in $(pgrep -x beam.smp 2>/dev/null || true); do
  cwd="$(lsof -a -p "$pid" -d cwd -Fn 2>/dev/null | sed -n 's/^n//p' | head -1)"
  [ "$cwd" = "$root" ] || continue
  p="$(lsof -a -p "$pid" -iTCP -sTCP:LISTEN -P -Fn 2>/dev/null |
    sed -n 's/^n.*:\([0-9][0-9]*\)$/\1/p' | sort -n | head -1)"
  if [ -n "$p" ]; then
    echo "$p"
    exit 0
  fi
done

# 3. deterministic fallback: base + :erlang.phash2(GIT_WORKTREE, 1000).
#    Cached per worktree — an elixir boot per shell prompt is too slow.
#    Self-derives GIT_WORKTREE ({repo}-{branch-slug}) when unset, so the
#    port is correct even before mise env exports it (fresh worktrees).
wt="${GIT_WORKTREE:-}"
if [ -z "$wt" ]; then
  gd="$(git -C "$root" rev-parse --git-dir 2>/dev/null || true)"
  case "$gd" in
  */worktrees/*)
    repo="$(basename "$(dirname "$(git -C "$root" rev-parse --path-format=absolute --git-common-dir)")")"
    br="$(git -C "$root" branch --show-current 2>/dev/null)"
    [ -n "$br" ] || br="$(basename "$root")"
    wt="${repo}-$(printf "%s" "$br" | tr -c "A-Za-z0-9_" "-" | sed -e "s/--*/-/g" -e "s/^-//" -e "s/-*$//")"
    ;;
  esac
fi
# slashes in branch-name worktrees would create subdirs — flatten for filename
wt_file="$(printf "%s" "${wt:-main}" | tr -c "A-Za-z0-9_." "-")"
cache="$root/.local/cache/phx-port-${wt_file}"
if [ -s "$cache" ]; then
  cat "$cache"
  exit 0
fi
if command -v elixir >/dev/null 2>&1; then
  port="$(GIT_WORKTREE="$wt" elixir -e '
    off =
      case System.get_env("GIT_WORKTREE") do
        w when w in [nil, ""] -> 0
        w -> :erlang.phash2(w, 1000)
      end
    IO.puts(4000 + off)')"
  mkdir -p "$(dirname "$cache")"
  echo "$port" >"$cache"
  echo "$port"
else
  echo "$base"
fi
PHXPORT
chmod +x .local/bin/phx-port
echo "generated .local/bin/phx-port -> $(.local/bin/phx-port)"
'''

[tasks."bootstrap:pi"]
description = "Generate AGENTS.md (repo/worktree root) and merge tidewave into .pi/mcp.json"
depends = ["bootstrap:phx-port"]
shell = "bash -c"
run = '''
set -euo pipefail
mkdir -p .pi
port="$(bash .local/bin/phx-port)"

# ── AGENTS.md (source of truth is this inline markdown) ────────────────
# Written to the project/worktree root (git toplevel), not .pi/agent/.
root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
f="$root/AGENTS.md"
[ -L "$f" ] && rm "$f"
# clean up old generated location
[ -e .pi/agent/AGENTS.md ] && rm .pi/agent/AGENTS.md
cat > "$f" <<'AGENTS'
# Agent guide (generated by `mise run bootstrap:pi`)

Elixir Phoenix LiveView application.
Local tooling is managed by mise (`mise.local.toml`).

## Development requirements

- All code introspection, editing, reading, REPL usage, database access; should
  use the `tidewave` mcp server, see .pi/mcp.json. All attempts should be made
  to use that tooling first, before resorting to other Bash, Read, and/or Write tool calls.

## Testing requirements

- If postgres connection related errors occur during test running, pass `POOL_SIZE` env var
  value to reduce the pool size to something more manageable for this local machine.
- Whether we caused a test error, in the current commit, branch, PR, or not, we absolutely
  must make all attempts at correctly fixing the errors.

## Ports

- Phoenix dev port derives from `GIT_WORKTREE`:
  `4000 + :erlang.phash2(GIT_WORKTREE, 1000)` (see `config/dev.exs`).
- `PHX_PORT` is exported by mise via `.local/bin/phx-port`:
  `$PORT` override → running beam process → deterministic phash fallback.
- Tidewave MCP server: `http://localhost:$PHX_PORT/tidewave/mcp`
  (wired into `.pi/mcp.json`; requires the Phoenix server running in dev).

## Tasks

- `mise run preflight` — trust config, install tools, bootstrap, start shared postgres
- `mise run setup` — full app setup (hex, deps, assets, databases)
- `mise run start:server` — start Phoenix (`m s`)
- `mise run bootstrap` — regenerate `.local/bin/phx-port`, this file, and `.pi/mcp.json`

## Verification

- `mix format` after every major change
- `mix test` after every work session
- `mix check` before committing
AGENTS

# ── .pi/mcp.json: merge tidewave entry, preserve other servers ─────────
m=.pi/mcp.json
[ -L "$m" ] && rm "$m"
[ -s "$m" ] || echo '{"mcpServers":{}}' > "$m"
tmp="$(mktemp)"
jq --arg url "http://localhost:${port}/tidewave/mcp" \
  '.mcpServers.tidewave = {type: "streamable-http", url: $url, lifecycle: "keep-alive"}' \
  "$m" > "$tmp" && mv "$tmp" "$m"

echo "bootstrapped .pi (tidewave -> http://localhost:${port}/tidewave/mcp)"
'''

[tasks.setup]
description = "Initial project setup + preflight"
depends = ["preflight"]
shell = "bash -c"
run = '''
mix archive.install github hexpm/hex branch main --force
mix local.rebar --force
mix deps.get
mix assets.setup

mix ecto.create || mix ecto.drop
mix ecto.reset
MIX_ENV=test mix ecto.reset
'''

[tasks."setup:db"]
description = "Init shared postgres cluster in ./tmp/pg (idempotent)"
shell = "bash -c"
run = '''
set -euo pipefail
mkdir -p "$PG_ROOT"
if [ ! -s "$PGDATA/PG_VERSION" ]; then
  # -U postgres: superuser named "postgres", default local trust auth.
  # dev.exs sends password "postgres" but trust auth never checks it.
  initdb -D "$PGDATA" -U postgres --encoding=UTF8 --locale=C
fi
conf="$PGDATA/postgresql.conf"
if ! grep -q '^# rx local settings' "$conf"; then
  cat >>"$conf" <<EOF

# rx local settings (appended by setup:db)
listen_addresses = '$HOST'
port = $PGPORT
unix_socket_directories = '$PG_ROOT'
# One instance shared by main repo + all .worktrees checkouts:
# 3 repos x pool_size 10 per checkout, plus test runs. Stock 100 is too tight.
max_connections = 300
EOF
fi
echo "cluster ready: $PGDATA"
'''

[tasks."start:db"]
description = "Start shared postgres in background (log: ./tmp/pg/postgres.log)"
depends = ["setup:db"]
shell = "bash -c"
run = '''
set -euo pipefail
if pg_ctl -D "$PGDATA" status >/dev/null 2>&1; then
  echo "postgres already running"
else
  # pg_ctl start daemonizes; -l appends server log; waits (-w) by default
  # until the server accepts connections.
  pg_ctl -D "$PGDATA" -l "$PG_LOG" start
fi
pg_isready -h "$PGHOST" -p "$PGPORT"
'''

[tasks."start:server"]
description = "Start web server"
depends = ["start:db"]
run = "m s"
