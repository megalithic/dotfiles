# Worktrunk project config for Elixir/Phoenix (local-only, gitignored).
#
# Generated to <repo>/.config/wt.toml (Worktrunk's default project config
# path; the wrapper leaves Worktrunk's default resolution intact).
#
# pre-start runs once when a new worktree is created (blocking). It is also
# re-runnable on demand (wt-tmux-target bootstraps existing worktrees with it),
# so every step here is idempotent and non-destructive:
#   - trust config for direnv + mise
#   - install the services script into the worktree's PRIVATE git dir
#     (.git/worktrees/<name>/), never the working tree, so nothing can be
#     accidentally committed and it is auto-removed with the worktree.
#
# The heavy setup (deps, assets, DB resets) runs in the tmux `services` window
# via that script, guarded so reopening a worktree only restarts the server.
[pre-start]
mise-trust = "mise trust" # Execute mise trust before creating a worktree
# Install the services runner into the worktree's PRIVATE git dir
# (.git/worktrees/<name>/wt-services-cmd) from the MAIN checkout's
# .config/scripts/wt-services-cmd.sh (the new worktree's .config/ is not
# copied until post-start). wt-tmux-target runs it in the `services` window.
# Idempotent; skipped in the main checkout.
services-cmd = '''
gitdir="$(git rev-parse --absolute-git-dir)"
case "$gitdir" in */worktrees/*) ;; *) exit 0 ;; esac
main="$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")"
src="$main/.config/scripts/wt-services-cmd.sh"
[ -f "$src" ] && install -m 0755 "$src" "$gitdir/wt-services-cmd"
'''

[post-start]
copy = "wt step copy-ignored" # Copy ignored files (incl. .config/) after creating a worktree

# NOTE: no [post-switch] services hook — `mise run start:server` boots iex and
# would block the wt command. The services tmux window (wt-tmux-target) runs
# it via the pre-start-installed wt-services-cmd instead.

# Dev server URL column in `wt list` (dimmed when the port is not listening).
[list]
url = "http://localhost:{{ branch | hash_port }}"
