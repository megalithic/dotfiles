"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
(${custom.jj}${custom.git_branch})\
${custom.git_status}\
$cmd_duration\
$line_break\
${custom.nix_shell}\
${custom.sudo}\
${custom.jobs}\
$status\
$character"""

command_timeout = 500

# move the rest of the prompt to the right
right_format = """$time"""

[fill]
symbol = ' '

[time]
disabled = false
style = "yellow dimmed"
format = '[$time]($style) '
time_format = "%T"
# utc_time_offset = "-5"
# time_range = "10:00:00-14:00:00 no this nix_shell"

[username]
style_root = "red"
style_user = "purple"
format = "[$user]($style)@"

[hostname]
style = "yellow"
format = "[$hostname]($style) "

[cmd_duration]
format = "[ $duration]($style) "
style = "bold fg:yellow"
min_time = 500

[character]
# alts:  ŌĆ║Ņ¬Č’äģ’üö¾░ģé’æĀ ’äü
format = "$symbol "
success_symbol = "[ŌĆ║](bold green)"
error_symbol = "[ŌĆ║](bold red)"
vicmd_symbol = "[’æÅ](bold fg:white,bg:#614b51)"

[custom.jobs]
ignore_timeout = true
description = "background job count with fancy number glyphs"
shell = ["sh"]
symbol = "¾░äē" # ’śĮ’äģ
command = '''
  fancy_numbers "${STARSHIP_JOBS_COUNT:-0}"
'''
when = '''
  [ "${STARSHIP_JOBS_COUNT:-0}" -ge 1 ] 2>/dev/null
'''
format = "$output[$symbol](white dimmed)"

[jobs]
disabled = true
symbol = "¾░äē(white dimmed)" # ’śĮ’äģ
number_threshold = 1
symbol_threshold = 1
format = "$number$symbol"

# [custom.desk]
# description = "indicates whether you're in a desk-spawned shell"
# command = "(command desk -v &>/dev/null && (desk | grep -q 'No desk activated.' && echo '' || echo '­¤ÜĆ')) || echo ''"
# when = "true"


[custom.nix_shell]
ignore_timeout = true
symbol = "¾▒äģ"
# shell = ["bash", "--noprofile", "--norc"]
command = '''
  echo "$(echo $name | sed 's/-shell//')/$IN_NIX_SHELL"
'''
format = '\[[[$symbol](#ffffff) $output](#aaaaaa)\] '
when = "[[ -n $IN_NIX_SHELL ]]"

# [nix_shell]
# impure_msg = '[-impure](#614b51)'
# pure_msg = '[-pure](#888888)'
# unknown_msg = '[-unknown](yellow)'
# format = '[[¾▒äģ](#ffffff) $name$state](#aaaaaa) '

[custom.sudo]
ignore_timeout = true
# shell = ["bash", "--noprofile", "--norc"]
description = "valid sudo timestamp marker"
command = "echo -n ''"
format = "[$symbol$output]($style) "
style = "bold fg:#614b51"
when = "sudo -vn &>/dev/null"

[custom.jj]
ignore_timeout = true
shell = ["bash", "--noprofile", "--norc"]
description = "The current jj status with workspace indicator"
detect_folders = [".jj"]
symbol = ""
# symbol = "¾▒Śå "
# hidden? ­¤æ╗
command = '''
  # Detect workspace from path (jj templates don't expose workspace info)
  # ws_path=$(jj workspace root 2>/dev/null)
  # ws_prefix=""
  # if [[ "$ws_path" == *"/.workspaces/"* ]]; then
  #   ws_name=$(basename "$ws_path")
  #   # Cyan color for workspace indicator: \x1b[36m
  #   ws_prefix="\x1b[36m${ws_name}\x1b[0m "
  # fi

  # Get parent bookmark (with color) if @ is empty and has no bookmarks (typical working state)
  parent_bookmark=""
  if jj log -r @ --no-graph -T 'if(empty && bookmarks.len() == 0, "yes", "")' 2>/dev/null | grep -q yes; then
    parent_bookmark=$(jj log -r '@-' --no-graph --color always -T 'bookmarks' 2>/dev/null)
  fi

  jj_output=$(jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
    separate(" ",
      change_id.shortest(4),
      bookmarks,
      "Ōŗ«",
      concat(
        if(conflict, "¾░öĘ"),
        if(divergent, "¾░¦ł"),
        if(hidden, "¾░śō"),
        if(immutable, ""),
      ),
      raw_escape_sequence("\x1b[1;32m") ++ if(empty, "(empty)"),
      raw_escape_sequence("\x1b[1;32m") ++ coalesce(
        truncate_end(29, description.first_line(), "ŌĆ”"),
        "",
      ) ++ raw_escape_sequence("\x1b[0m"),
    )
  ')

  # Inject parent bookmark after change_id if we found one (preserves jj color codes)
  if [[ -n "$parent_bookmark" ]]; then
    # Insert parent bookmark right after change_id, before the Ōŗ«
    jj_output=$(echo "$jj_output" | sed "s/Ōŗ«/${parent_bookmark} Ōŗ«/")
  fi

  # Check for uncommitted changes (dirty working copy)
  dirty=""
  if jj status --no-pager 2>/dev/null | grep -q "Working copy changes:"; then
    # megagrove red: #e67e80 ŌĆö  (dirty/staged icon from prompt_megalithic_setup)
    dirty=" \x1b[38;2;230;126;128m\x1b[0m"
  fi

  echo -e "${jj_output}${dirty}"
'''

[git_branch]
disabled = true
truncation_symbol = "ŌĆ”"
truncation_length = 20
symbol = "[’Éś](bold fg:#626262)" # ’×Ī’Éś
format = "[$branch]($style)"
style = "italic fg:#7c8377"     # 245

[custom.git_branch]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ! jj root >/dev/null 2>&1"
shell = ["sh"]
command = "starship module git_branch"
style = "italic fg:#7c8377"                                                               # 245
format = "[$output]($style)"

[git_status]
disabled = true
style = "#7c8377"
format = '([$conflicted$staged$modified$renamed$deleted$untracked$stashed$ahead_behind](fg:$style) )'
ahead = " [Ņ¬Ī](fg:white)"                                                                              # ŌćĪ
behind = " [Ņ¬Ü](fg:white)"                                                                             # ŌćŻ
diverged = " ¾░¦łŅ¬Ī${ahead_count}Ņ¬Ü${behind_count}"
modified = " [¾░øä](fg:purple)"                                                                          #ŌĆó’»é
# modified = "[~${count}](fg:red)"
staged = " [’ü¦](fg:green)"
# staged = "[’ü¦$count](fg:green)"
conflicted = " [¾░öĘ](bold fg:#FAB005)[’æĆ${count}](fg:#d9bb80)"
stashed = " [’éŚ${count}](fg:white)"
deleted = " [Ņ®Č](fg:red)"
# deleted = "[’ÖĢ$count](fg:red)"
renamed = " [Ņ¬£](fg:white)"
# renamed = "[’æÜ${count}](fg:white)"
untracked = " [¾▒Åś](fg:#eeeeee)"
# untracked = "[¾▒Åś${count}](fg:#7c8377)"

[custom.git_status]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ! jj root >/dev/null 2>&1"
shell = ["sh"]
command = "starship module git_status | fancy_numbers"
style = "#7c8377"
format = '[$output](fg:$style)'

[directory]
truncation_length = 2
truncation_symbol = "ŌĆ”/"
truncate_to_repo = true
fish_style_pwd_dir_length = 1
style = "bold blue"

