#:schema https://jj-vcs.github.io/jj/latest/config-schema.json
# XDG-native global jj config (mise-managed twin of the Home Manager setup).
# Merged from the HM-rendered ~/.config/jj/config.toml (aliases.nix + default.nix)
# plus the formerly-unmanaged ~/.jjconfig.toml survivors (revset-aliases,
# revsets, template-aliases, templates.log/log_node, ui.graph, should-sign-off
# -- the content of the unwired nix templates.nix).

[aliases]
b = ["bookmark"]
bm = ["bookmark"]
checkout = ["co"]
co = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
if [[ -z "${1:-}" ]]; then
  echo "Usage: jj co <branch-name>" >&2
  exit 1
fi

# Capture previous position before switching
prev_bookmark=$(jj log -r @ --no-graph -T 'local_bookmarks.join(", ")' 2>/dev/null)
prev_change=$(jj log -r @ --no-graph -T 'change_id.shortest()' 2>/dev/null)

jj git fetch

# Check if branch exists on origin
if jj log -r "$1@origin" --no-graph -T 'commit_id.short()' 2>/dev/null | grep -q .; then
  echo "Switching to remote branch: $1@origin"
  jj new "$1@origin"
  jj bookmark track "$1@origin" 2>/dev/null || true
# Check if local bookmark exists
elif jj log -r "$1" --no-graph -T 'commit_id.short()' 2>/dev/null | grep -q .; then
  echo "Switching to local bookmark: $1"
  jj new "$1"
  echo "Ready to work on top of $1"
else
  # Create new branch from main@origin
  echo "Branch $1 not found, creating from main@origin..."
  jj new main@origin -m "feat: $1"
  jj bookmark create "$1" -r @
  echo "Created new branch: $1"
fi

# Show previous position for easy return
if [[ -n "$prev_bookmark" ]]; then
  echo "Previous position: $prev_bookmark ($prev_change)"
else
  echo "Previous position: $prev_change (no bookmark)"
fi
""", ""]
d = ["describe"]
dm = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Parse args: look for -b <bookmark> flag
bookmark=""
message=""
while [[ $# -gt 0 ]]; do
  case "$1" in
    -b|--bookmark)
      bookmark="$2"
      shift 2
      ;;
    *)
      message="$1"
      shift
      ;;
  esac
done

if [[ -z "$message" ]]; then
  echo "Usage: jj dm [-b <bookmark>] <message>" >&2
  exit 1
fi

jj describe -m "$message"

# Use explicit bookmark or find closest
if [[ -z "$bookmark" ]]; then
  bookmark=$(jj log -r 'closest_bookmark(@)' --no-graph \
    -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)
fi

# Move bookmark if found and not main
if [[ -n "$bookmark" && "$bookmark" != "main" ]]; then
  jj bookmark set "$bookmark" -r @
  echo "Moved bookmark '$bookmark' to @"
fi
''', ""]
done = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Get current bookmark
bookmark=$(jj log -r @ --no-graph \
  -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)

if [[ -z "$bookmark" || "$bookmark" == "main" ]]; then
  echo "Error: Not on a feature bookmark (current: ${bookmark:-none})" >&2
  exit 1
fi

echo "Cleaning up after merged PR..."
echo "  Deleting bookmark: $bookmark"
jj bookmark delete "$bookmark"

echo "  Switching to main..."
jj edit main

echo "  Fetching latest..."
jj git fetch

echo "  Rebasing main onto origin..."
jj rebase -d main@origin -r main

echo "Done! You're now on main at the latest."
''', ""]
dv = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Parse args: look for -b <bookmark> flag
bookmark=""
while [[ $# -gt 0 ]]; do
  case "$1" in
    -b|--bookmark)
      bookmark="$2"
      shift 2
      ;;
    *)
      shift
      ;;
  esac
done

jj describe

# Use explicit bookmark or find closest
if [[ -z "$bookmark" ]]; then
  bookmark=$(jj log -r 'closest_bookmark(@)' --no-graph \
    -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)
fi

# Move bookmark if found and not main
if [[ -n "$bookmark" && "$bookmark" != "main" ]]; then
  jj bookmark set "$bookmark" -r @
  echo "Moved bookmark '$bookmark' to @"
fi
''', ""]
feat = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

bookmark=""
message=""
args=()

while [[ $# -gt 0 ]]; do
  case "$1" in
    -b|--bookmark)
      [[ -z "${2:-}" ]] && echo "Error: -b requires a bookmark name" >&2 && exit 1
      bookmark="$2"
      shift 2
      ;;
    *)
      args+=("$1")
      shift
      ;;
  esac
done

if [[ ${#args[@]} -gt 0 ]]; then
  message="${args[*]}"
fi

if [[ -z "$bookmark" && -z "$message" ]]; then
  echo "Usage: jj feat [-b <bookmark>] [message]"
  echo "Examples:"
  echo "  jj feat -b my-feat             # Start 'my-feat' from main@origin"
  echo "  jj feat -b my-feat \"wip\"     # Start 'my-feat' with message"
  echo "  jj feat \"wip\"                  # Start on main@origin with message (no bookmark)"
  exit 0
fi

jj git fetch
jj new main@origin

if [[ -n "$message" ]]; then
  jj describe -m "$message"
fi

if [[ -n "$bookmark" ]]; then
  # Capture bookmark list to avoid pipefail issues with jj util exec
  bookmark_list=$(jj bookmark list 2>/dev/null || true)
  if echo "$bookmark_list" | rg -q "^$bookmark:"; then
    jj bookmark set "$bookmark" -r @ -B
    echo "Moved existing bookmark '$bookmark' to @"
  else
    jj bookmark create "$bookmark" -r @
    echo "Created feature bookmark: $bookmark"
  fi
fi
''', ""]
feat-here = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

bookmark=""
message=""
args=()

while [[ $# -gt 0 ]]; do
  case "$1" in
    -b|--bookmark)
      [[ -z "${2:-}" ]] && echo "Error: -b requires a bookmark name" >&2 && exit 1
      bookmark="$2"
      shift 2
      ;;
    *)
      args+=("$1")
      shift
      ;;
  esac
done

if [[ ${#args[@]} -gt 0 ]]; then
  message="${args[*]}"
fi

if [[ -z "$bookmark" && -z "$message" ]]; then
  echo "Usage: jj feat-here [-b <bookmark>] [message]"
  echo "Examples:"
  echo "  jj feat-here -b my-feat         # Start 'my-feat' from current"
  echo "  jj feat-here \"wip\"              # Continue with message (no bookmark)"
  exit 0
fi

jj new

if [[ -n "$message" ]]; then
  jj describe -m "$message"
fi

if [[ -n "$bookmark" ]]; then
  # Capture bookmark list to avoid pipefail issues with jj util exec
  bookmark_list=$(jj bookmark list 2>/dev/null || true)
  if echo "$bookmark_list" | rg -q "^$bookmark:"; then
    jj bookmark set "$bookmark" -r @ -B
    echo "Moved existing bookmark '$bookmark' to @ (from current position)"
  else
    jj bookmark create "$bookmark" -r @
    echo "Created feature bookmark: $bookmark (from current position)"
  fi
fi
''', ""]
fixup = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Check we have changes
if jj log -r @ --no-graph -T 'if(empty, "true", "false")' | grep -q 'true'; then
  echo "Error: Current change is empty, nothing to squash" >&2
  exit 1
fi

# Find bookmark on parent (where we're squashing into)
bookmark=$(jj log -r 'closest_bookmark(@-)' --no-graph \
  -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)

if [[ -z "$bookmark" || "$bookmark" == "main" ]]; then
  echo "Error: No feature bookmark on parent commit" >&2
  exit 1
fi

echo "Squashing into bookmark: $bookmark"
jj squash

# Confirm push
echo ""
jj log -r "$bookmark"
echo ""
read -p "Push $bookmark to origin? [y/N] " -n 1 -r
echo
if [[ $REPLY =~ ^[Yy]$ ]]; then
  jj git push --bookmark "$bookmark"
else
  echo "Skipped push. Run: jj git push --bookmark $bookmark"
fi
''', ""]
g = ["git"]
here = ["bookmark", "move", "--from", "closest_bookmark(@)", "--to", "@"]
l = ["log"]
ll = ["log", "-T", "builtin_log_compact_full_description_with_diff"]
main = ["bookmark", "move", "main", "--to", "@"]
pr = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Parse args: extract --base, collect rest for gh
base="main"
gh_args=()
while [[ $# -gt 0 ]]; do
  case "$1" in
    --base)
      base="$2"
      shift 2
      ;;
    *)
      gh_args+=("$1")
      shift
      ;;
  esac
done

# Find closest bookmark
bookmark=$(jj log -r 'closest_bookmark(@)' --no-graph \
  -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)

if [[ -z "$bookmark" ]]; then
  echo "Error: No bookmark found. Create one first:" >&2
  echo "  jj bookmark create <name>" >&2
  exit 1
fi

if [[ "$bookmark" == "main" ]]; then
  echo "Error: Can't create PR from main. Create a feature bookmark first:" >&2
  echo "  jj feat <name>" >&2
  exit 1
fi

echo "Creating PR for bookmark: $bookmark (base: $base)"

# Push the bookmark first
echo "Pushing $bookmark..."
jj git push -b "$bookmark"

# Create the PR (--fill uses commit info for title/body)
gh pr create --head "$bookmark" --base "$base" --fill "${gh_args[@]}"
''', ""]
pr-fix = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Find closest bookmark (PR branch)
bookmark=$(jj log -r 'closest_bookmark(@)' --no-graph \
  -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)

if [[ -z "$bookmark" || "$bookmark" == "main" ]]; then
  echo "Error: No feature bookmark found. Create one first:" >&2
  echo "  jj bookmark create <name>" >&2
  exit 1
fi

echo "Working on bookmark: $bookmark"

# Create new commit and describe
jj new
if [[ -n "${1:-}" ]]; then
  jj describe -m "$1"
else
  jj describe
fi

# Move bookmark to new commit
jj bookmark move "$bookmark" --to @

# Confirm push
echo ""
jj log -r "$bookmark"
echo ""
read -p "Push $bookmark to origin? [y/N] " -n 1 -r
echo
if [[ $REPLY =~ ^[Yy]$ ]]; then
  jj git push --bookmark "$bookmark"
else
  echo "Skipped push. Run: jj git push --bookmark $bookmark"
fi
''', ""]
push = ["util", "exec", "--", "bash", "-c", '''
set -euo pipefail

# Parse args: extract bookmark and --pr flag
bookmark=""
create_pr=false
draft_pr=false
pass_args=()

while [[ $# -gt 0 ]]; do
  case "$1" in
    -b|--bookmark)
      bookmark="$2"
      pass_args+=("$1" "$2")
      shift 2
      ;;
    --pr)
      create_pr=true
      shift
      ;;
    --prd)
      create_pr=true
      draft_pr=true
      shift
      ;;
    *)
      pass_args+=("$1")
      shift
      ;;
  esac
done

# Require -b flag
if [[ -z "$bookmark" ]]; then
  closest=$(jj log -r 'closest_bookmark(@)' --no-graph \
    -T 'self.bookmarks().map(|b| b.name()).join("\n")' 2>/dev/null | head -1)

  echo "Error: Must specify bookmark with -b <bookmark>" >&2
  if [[ -n "$closest" && "$closest" != "main" ]]; then
    echo "Did you mean: jj push -b $closest" >&2
  fi
  exit 1
fi

# Check if bookmark exists and is not empty
if ! jj log -r "$bookmark" --no-graph -T 'change_id.short()' 2>/dev/null | grep -q .; then
  echo "Error: Bookmark '$bookmark' not found." >&2
  exit 1
fi

if jj log -r "$bookmark" --no-graph -T 'if(empty, "true", "false")' | grep -q 'true'; then
  echo "Error: Bookmark '$bookmark' points to an empty commit." >&2
  echo "Make changes and run 'jj dm \"message\"' first." >&2
  exit 1
fi

# Check if bookmark needs --allow-new (doesn't exist on remote)
if ! jj bookmark list --remote origin 2>/dev/null | grep -q "^$bookmark@origin:"; then
  echo "Bookmark '$bookmark' is new, adding --allow-new"
  pass_args+=("--allow-new")
fi

# Push
jj git push "${pass_args[@]}"

# Create PR if requested
if $create_pr; then
  echo ""
  if $draft_pr; then
    echo "Creating Draft PR..."
    gh pr create --head "$bookmark" --base main --fill --draft
  else
    echo "Creating PR..."
    gh pr create --head "$bookmark" --base main --fill
  fi
fi
''', ""]
rb = ["rebase"]
s = ["status"]
switch = ["co"]
tug = ["bookmark", "move", "--from", "closest_bookmark(@-)", "--to", "@-"]
up = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
jj git fetch
jj rebase -b @ -d main@origin
""", ""]

[colors]
change_id = "cyan"
commit_id = "magenta"
"node conflict" = "red"
"node elided" = "yellow"
"node immutable" = "red"
"node working_copy" = "green"
"working_copy description placeholder" = "yellow"
"working_copy empty" = "green"
"working_copy empty description placeholder" = "green"
"working_copy placeholder" = "red"

[colors.node]
bold = false

[colors."node normal"]
bold = false

[colors.prefix]
bold = true
fg = "cyan"

[colors.rest]
bold = false
fg = "bright black"

[merge-tools.difftool]
diff-args = ["-c", "DiffEditor $left $right $output"]
program = "nvim"

[remotes.origin]
auto-track-bookmarks = "glob:*"

[revset-aliases]
"closest_bookmark(to)" = "heads(::to & bookmarks())"
current_work = "trunk()..@ | @..trunk() | trunk() | @:: | fork_point(trunk() | @)"
"stack()" = "ancestors(reachable(@, mutable()), 2)"
"stack(x)" = "ancestors(reachable(x, mutable()), n)"
"stack(x, n)" = "ancestors(reachable(x, mutable()), n)"

[revsets]
log = "current_work"

[signing]
backend = "ssh"
behavior = "own"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICyxphJ0fZhJP6OQeYMsGNQ6E5ZMVc/CQdoYrWYGPDrh"

[signing.backends.ssh]
allowed-signers = "/Users/seth/.ssh/allowed_signers"
program = "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"

[snapshot]
auto-update-stale = true

[template-aliases]
"abbreviate_relative_timestamp(s)" = "coalesce(\n    abbreviate_timestamp_suffix(s, \" millisecond\", \"ms\"),\n    abbreviate_timestamp_suffix(s, \" second\", \"s\"),\n    abbreviate_timestamp_suffix(s, \" minute\", \"m\"),\n    abbreviate_timestamp_suffix(s, \" hour\", \"h\"),\n    abbreviate_timestamp_suffix(s, \" day\", \"d\"),\n    abbreviate_timestamp_suffix(s, \" week\", \"w\"),\n    abbreviate_timestamp_suffix(s, \" month\", \"mo\"),\n    abbreviate_timestamp_suffix(s, \" year\", \"y\"),\n    s\n)\n"
"abbreviate_timestamp_suffix(s, suffix, abbr)" = "if(\n    s.ends_with(suffix),\n    s.remove_suffix(suffix) ++ label(\"timestamp\", abbr)\n)\n"
"format_short_id(id)" = "id.shortest()"
"format_timestamp(timestamp)" = "coalesce(\n    if(timestamp.after(\"1 minute ago\"), label(\"timestamp\", \"<=1m\")),\n    abbreviate_relative_timestamp(timestamp.ago().remove_suffix(' ago').remove_suffix('s'))\n)\n"

[templates]
draft_commit_description = "builtin_draft_commit_description_with_diff"
log = "if(root,\n  format_root_commit(self),\n  label(if(current_working_copy, \"working_copy\"),\n    concat(\n      separate(\" \",\n        pad_end(4, format_short_change_id(change_id)),\n        if(empty, label(\"empty\", \"(empty)\")),\n        if(description,\n          description.first_line(),\n          label(if(empty, \"empty\"), description_placeholder),\n        ),\n        bookmarks,\n        tags,\n        working_copies,\n        if(self.contained_in('first_parent(@)'), label(\"git_head\", \"HEAD\")),\n        if(conflict, label(\"conflict\", \"conflict\")),\n        if(config(\"ui.show-cryptographic-signatures\").as_boolean(),\n          format_short_cryptographic_signature(signature)),\n        format_timestamp(commit_timestamp(self)),\n      ) ++ \"\\n\",\n    ),\n  )\n)\n"
log_node = "label(\"node\",\n  coalesce(\n    if(!self, label(\"elided\", \"~\")),\n    if(current_working_copy, label(\"working_copy\", \"@\")),\n    if(conflict, label(\"conflict\", \"×\")),\n\n    if(immutable, label(\"immutable\", \"*\")),\n    label(\"normal\", \"·\")\n  )\n)\n"

[ui]
default-command = "log"
should-sign-off = true
diff-editor = ["nvim", "-c", "DiffEditor $left $right $output"]
diff-formatter = ":git"
pager = "delta"
show-cryptographic-signatures = true

[ui.graph]
style = "curved"

[user]
email = "seth@megalithic.io"
name = "Seth Messer"
