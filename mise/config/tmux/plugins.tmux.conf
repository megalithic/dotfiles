# -- tmux-resurrect + tmux-continuum (crash recovery)
# Server death (e.g. tmux/tmux#4962 SIGABRT) previously lost all sessions.
# Continuum autosaves every 15 min; restore with prefix + R (resurrect)
# or automatically on server start.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
# Restore running processes. pi-family panes (p/pinvim/pi) all resolve to `pi`;
# inline strategy relaunches them with `pinvim -c` (profile + continue last
# session for that dir). NOTE: two pi panes in the SAME cwd both continue the
# most-recent session (collision) ŌĆö fine for distinct worktrees/dirs.
set -g @resurrect-processes '"~pi->pinvim -c" nvim'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
# resurrect defaults (prefix+C-s save, prefix+C-r restore) collide with
# easymotion (C-s) and config reload (C-r); use S/R instead
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# install tpm if not already installed
