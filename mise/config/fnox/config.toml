# Global fnox config for the mise bootstrap migration.
# Replace AGE_RECIPIENT before first real use, then store OP_SERVICE_ACCOUNT_TOKEN
# with `fnox set OP_SERVICE_ACCOUNT_TOKEN ops_... --provider age`.

[providers]
# age = { type = "age", recipients = ["AGE_RECIPIENT_REPLACE_ME"] }
onepass = { type = "1password", vault = "Crypt" }

[secrets]
# Bootstrap token. Keep encrypted with age, never plaintext in git.
# OP_SERVICE_ACCOUNT_TOKEN = { provider = "age", value = "..." }

ENV_VARS_SH = { provider = "onepass", value = "op://Crypt/env/notesPlain" }
S3CFG = { provider = "onepass", value = "op://Crypt/s3cfg/notesPlain" }
APPLE_ID_EMAIL = { provider = "onepass", value = "op://Crypt/apple-developer/username" }
APPLE_TEAM_ID = { provider = "onepass", value = "op://Crypt/apple-developer/Section_6qgogrdycnlqc4x7ngqwchlyvi/team id" }
APPLE_NOTARYTOOL_PASSWORD = { provider = "onepass", value = "op://Crypt/apple-developer/Section_6qgogrdycnlqc4x7ngqwchlyvi/notarytool app password" }

# Re-enable after the work item moves to a known vault.
# WORK_ENV_VARS_SH = { provider = "onepass", value = "op://Work/workbookpro-vars/shell-exports" }
