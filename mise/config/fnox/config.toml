#:schema https://fnox.jdx.dev/schema.json
# Global fnox config — linked to ~/.config/fnox/config.toml by the mise
# dotfiles table (mise/config/mise/global_config.toml). Non-nix twin of home/common/programs/opnix.
#
# Auth: op CLI with 1Password desktop-app integration (biometric); no
# service-account token needed on this machine. For headless/CI use, bootstrap
# OP_SERVICE_ACCOUNT_TOKEN with an age provider per
# https://fnox.jdx.dev/providers/1password.html.

[providers]
onepass = { type = "1password", vault = "Crypt" }
op = { type = "1password", vault = "Crypt" }

[secrets]
# File-shaped blobs: env = false keeps them out of `fnox exec` / shell
# activation; read them with `fnox get`. ENV_VARS_SH is rendered to
# ~/.config/fnox/secrets/env-vars.sh by `mise run setup:fnox:render` (sourced by
# fish conf.d/fnox.fish, the pi wrapper, and the mise [env] template).
ENV_VARS_SH = { provider = "onepass", value = "op://Crypt/env/notesPlain", env = true }
S3CFG = { provider = "onepass", value = "op://Crypt/s3cfg/notesPlain", env = true }

# On-demand single values: `fnox get APPLE_TEAM_ID`. env = false so shell
# activation doesn't hit 1Password on every new shell for rarely-used secrets.
APPLE_ID_EMAIL = { provider = "onepass", value = "op://Crypt/apple-developer/username", env = true }
APPLE_TEAM_ID = { provider = "onepass", value = "op://Crypt/apple-developer/Section_6qgogrdycnlqc4x7ngqwchlyvi/team id", env = true }
APPLE_NOTARYTOOL_PASSWORD = { provider = "onepass", value = "op://Crypt/apple-developer/Section_6qgogrdycnlqc4x7ngqwchlyvi/notarytool app password", env = true }
