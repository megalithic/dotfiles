#:tombi schema.strict = false

# Useful mise-based dotfiles repos and patterns:
#
# REFS:
# https://github.com/sedalu/dotfiles - auto-env based on machine name, not just arch/os; and container based install :mindblown:
# https://github.com/AllySummers/dotfiles - hk, pkl, usage releated stuff, too
# https://github.com/hashiiiii/dotfiles
# https://github.com/disrupted/dotfiles/blob/master/.config/mise/config.toml - tools i typically use
# https://github.com/JJGadgets/Biohazard/blob/main/.mise.toml - lots of aqua use
# https://github.com/disrupted/dotfiles/blob/master/.config/mise/config.toml - elixir related
#
[settings]
experimental = true

auto_install = true
env_shell_expand = true

# quiet = true
# verbose = false

activate_aggressive = true
cargo.binstall = true
color_theme = "everforest"
github.use_git_credentials = true
lockfile = true
minimum_release_age = "1d"
npm.package_manager = "aube"
pin = true
pipx.uvx = true
task.monorepo_depth = 2

[settings.status]
show_env = true
show_tools = true

[deps.aube]
auto = true

[env]
HK_MISE = "1"
HK_HIDE_WHEN_DONE = "true"
MISE_EXPERIMENTAL = "1"
DOTS = "{{env.HOME}}/.dotfiles"
DOTFILES_DIR = "{{env.HOME}}/.dotfiles"
CODE = "{{env.HOME}}/code"
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
XDG_DATA_HOME = "{{env.HOME}}/.local/share"
XDG_STATE_HOME = "{{env.HOME}}/.local/state"
XDG_CACHE_HOME = "{{env.HOME}}/.cache"
PI_STATE_DIR = "{{env.HOME}}/.local/state/pi"
# GitHub token for the private helium tap (brew-cask + gh). Sourced from the
# op://Crypt/env item (notesPlain), same secret fnox/opnix render to env-vars.sh.
# fnox render (`mise run fnox:render`) first, opnix fallback during transition.
HOMEBREW_GITHUB_API_TOKEN = '{{ exec(command="if [ -f ~/.config/fnox/secrets/env-vars.sh ]; then . ~/.config/fnox/secrets/env-vars.sh; elif [ -f ~/.config/opnix/secrets/env-vars.sh ]; then . ~/.config/opnix/secrets/env-vars.sh; fi; printf %s $HOMEBREW_GITHUB_API_TOKEN") }}'


[bootstrap.brew.taps]
"megalithic/helium" = "https://github.com/megalithic/helium-macos-releases"
[bootstrap.packages]
"brew:bash" = "latest"
"brew:fish" = "latest"
"brew:git" = "latest"
"brew:zsh" = "latest"
"brew:openssl@3" = "latest" # required by Python (ssl module) and networking Rust crates
"brew:pkgconf" = "latest"   # helps compilers locate openssl and other libs when building from source
"brew:poppler" = "latest"   # pdftotext etc. — pi wrapper expects poppler-utils on PATH

# brew casks using mise's `brew-cask:<formulae>` notation
"brew-cask:hammerspoon" = "latest"
# private repo; until then install via real `brew install --cask helium`.
# After install, pair with 1Password: `mise run helium:1password-trust` (1Password quit).
"brew-cask:megalithic/helium/helium" = "latest"

[dotfiles]
# "~/.config" = "mise/config"

# -- pi coding agent: managed subset of ~/.pi/agent; runtime state (sessions/,
#    npm/, auth.json, settings.json) stays unmanaged. settings.json is merged
#    by `mise run pi:setup`, not linked. --
"~/.pi/agent/AGENTS.md" = "mise/config/pi-coding-agent/agent/AGENTS.md"
"~/.pi/agent/APPEND_SYSTEM.md" = "mise/config/pi-coding-agent/agent/APPEND_SYSTEM.md"
"~/.pi/agent/keybindings.json" = "mise/config/pi-coding-agent/agent/keybindings.json"
"~/.pi/agent/models.json" = "mise/config/pi-coding-agent/agent/models.json"
"~/.pi/agent/mcp.json" = "mise/config/pi-coding-agent/agent/mcp.json"
"~/.pi/agent/extensions" = { source = "mise/config/pi-coding-agent/agent/extensions", mode = "symlink-each" }
"~/.pi/agent/skills" = { source = "mise/config/pi-coding-agent/agent/skills", mode = "symlink-each" }
"~/.pi/agent/prompts" = { source = "mise/config/pi-coding-agent/agent/prompts", mode = "symlink-each" }
"~/.pi/agent/agents" = { source = "mise/config/pi-coding-agent/agent/agents", mode = "symlink-each" }
"~/.local/bin/pi" = "mise/config/pi-coding-agent/bin/pi"
"~/.local/bin/pinvim" = "mise/config/pi-coding-agent/bin/pinvim"
"~/.local/bin/p" = "mise/config/pi-coding-agent/bin/p"
"~/.local/bin/pview" = "mise/config/pi-coding-agent/bin/pview"
"~/.local/bin/pi-acp" = "mise/config/pi-coding-agent/bin/pi-acp"
"~/.local/bin/work-tickets" = "mise/config/pi-coding-agent/bin/work-tickets"
# "~/Library/Developer/Xcode/UserData/FontAndColorThemes/tokyo-night.xccolortheme" = ".config/xcode/tokyo-night.xccolortheme"
"~/.config/mise/config.toml" = "mise/config/mise/global_config.toml"
"~/.config/fnox/config.toml" = "mise/config/fnox/config.toml"
"~/.config/fish" = "mise/config/fish"
"~/.config/fzf" = "mise/config/fzf"
"~/.config/jj/config.toml" = "mise/config/jj/config.toml"
"~/.config/ghostty" = "mise/config/ghostty"
"~/.config/hammerspoon" = "mise/config/hammerspoon"
"~/.config/kitty" = "mise/config/kitty"
"~/.config/nvim" = "mise/config/nvim"
"~/.config/tmux" = "mise/config/tmux"

# -- generated fragments → committed static files (replaces Home Manager Nix interpolation) --
# "~/.local/share/hammerspoon/nix_path.lua" = "mise/fragments/hammerspoon/nix_path.lua"
# "~/.local/share/hammerspoon/fragments/shade-next.lua" = "mise/fragments/hammerspoon/shade-next.lua"
# "~/.local/share/tmux/nix.conf" = "mise/fragments/tmux/nix.conf"
# "~/.config/shade-next/config.toml" = "mise/fragments/shade-next/config.toml"
"~/.config/sesame/config.jsonc" = { source = "mise/fragments/sesame/config.jsonc", mode = "template" }
# "~/.config/process-compose/shortcuts.yaml" = "mise/fragments/process-compose/shortcuts.yaml"
# "~/.config/process-compose/theme.yaml" = "mise/fragments/process-compose/theme.yaml"

# -- kanata: individual .kbd files (parent dir has mutable state; daemon/bar migration deferred to mbm-ju5m) --
"~/.config/kanata/macbook.kbd" = "config/kanata/macbook.kbd"
"~/.config/kanata/macbook-disabled.kbd" = "config/kanata/macbook-disabled.kbd"

# -- SSH: individual files (directory holds mutable keys/known_hosts; allowed_signers is store-generated, deferred to mbm-8afn) --
"~/.ssh/config" = "config/ssh/config"

# -- espanso: app support path, not XDG config (validated repo-final link chain) --
"~/Library/Application Support/espanso" = "config/espanso"

# -- store-flake-source files (currently Nix-store copies; mise links working-tree sources) --
# "~/.config/git/config" = "mise/fragments/git/config"
"~/.gitconfig" = "home/git/gitconfig"
"~/.gitignore" = "home/git/gitignore"
"~/.ignore" = "home/git/tool-ignore"

# -- static tool configs (small, single-file configs previously Nix-store-backed) --
"~/.config/bat/config" = "mise/config/bat/config"
"~/.config/direnv/direnv.toml" = "mise/config/direnv/direnv.toml"
"~/.config/starship.toml" = "mise/config/starship/starship.toml"
"~/.config/karabiner/karabiner.json" = "mise/config/karabiner/karabiner.json"
"~/.config/eza/theme.yml" = "mise/config/eza/theme.yml"
"~/.config/ripgrep/rc" = "mise/config/ripgrep/rc"
"~/.config/ripgrep/ignore" = "mise/config/fd/ignore"

# -- symlink-each targets (existing mutable dirs, needs per-entry reconciliation) --
"~/.local/bin" = { source = "bin", mode = "symlink-each" }
"~/bin" = { source = "bin", mode = "symlink-each" }


# Curated sections: semantic keys mise maps to canonical defaults writes.
[bootstrap.macos.dock]
autohide = true
orientation = "bottom"
tilesize = 60
magnification = false
show_recents = false
mru_spaces = false

[bootstrap.macos.finder]
show_all_files = true
show_pathbar = true
show_status_bar = true
show_extensions_warning = false
preferred_view_style = "list"

[bootstrap.macos.keyboard]
key_repeat = 6
initial_key_repeat = 25
press_and_hold = false
fn_state = false

[bootstrap.macos.trackpad]
tap_to_click = true
three_finger_drag = true

[bootstrap.macos.defaults.NSGlobalDomain]
AppleInterfaceStyle = "Dark"
AppleICUForce24HourTime = true
AppleKeyboardUIMode = 3
ApplePressAndHoldEnabled = false
AppleShowScrollBars = "WhenScrolling"
NSAutomaticCapitalizationEnabled = false
NSAutomaticDashSubstitutionEnabled = false
NSAutomaticPeriodSubstitutionEnabled = false
NSAutomaticQuoteSubstitutionEnabled = false
NSAutomaticSpellingCorrectionEnabled = false
NSAutomaticWindowAnimationsEnabled = false
NSDocumentSaveNewDocumentsToCloud = false
NSNavPanelExpandedStateForSaveMode = true
NSNavPanelExpandedStateForSaveMode2 = true
NSWindowResizeTime = 0.001
PMPrintingExpandedStateForPrint = true
PMPrintingExpandedStateForPrint2 = true
"com.apple.keyboard.fnState" = false
"com.apple.swipescrolldirection" = false
"com.apple.trackpad.scaling" = 3.0

[bootstrap.macos.defaults."com.apple.finder"]
AppleShowAllExtensions = true
AppleShowAllFiles = true
FXDefaultSearchScope = "SCcf"
FXEnableExtensionChangeWarning = false
FXPreferredViewStyle = "Nlsv"
NewWindowTarget = "Home"
QuitMenuItem = true
ShowExternalHardDrivesOnDesktop = true
ShowHardDrivesOnDesktop = false
ShowMountedServersOnDesktop = false
ShowPathbar = true
ShowRemovableMediaOnDesktop = true
ShowStatusBar = true
_FXShowPosixPathInTitle = true
_FXSortFoldersFirst = true

[bootstrap.macos.defaults."com.apple.dock"]
autohide = true
"autohide-time-modifier" = 0.7
"expose-animation-duration" = 0.0
launchanim = false
magnification = false
mineffect = "scale"
"minimize-to-application" = true
"mru-spaces" = false
orientation = "bottom"
"show-process-indicators" = true
"show-recents" = false
"static-only" = true
tilesize = 60

[bootstrap.macos.defaults."com.apple.screencapture"]
location = "~/__screenshots"
type = "png"
"disable-shadow" = true

[bootstrap.macos.defaults."com.apple.LaunchServices"]
LSQuarantine = false

[bootstrap.macos.defaults."com.apple.desktopservices"]
DSDontWriteNetworkStores = true
DSDontWriteUSBStores = true

[bootstrap.macos.defaults."com.apple.print.PrintingPrefs"]
"Quit When Finished" = true

[bootstrap.macos.defaults."com.mitchellh.ghostty"]
SUAutomaticallyUpdate = false
SUEnableAutomaticChecks = false
SUHasLaunchedBefore = true
SUSendProfileInfo = false

[bootstrap.macos.defaults."net.imput.helium"]
SUAutomaticallyUpdate = false
SUEnableAutomaticChecks = false

[bootstrap.macos.defaults."org.hammerspoon.Hammerspoon"]
MJConfigFile = "~/.config/hammerspoon/init.lua"

[bootstrap.macos.defaults."com.apple.SoftwareUpdate"]
AutomaticCheckEnabled = true
AutomaticDownload = 1
CriticalUpdateInstall = 1
ScheduleFrequency = 1

[bootstrap.macos.launchd.agents."com.megadots.espanso"]
program = "/Applications/Espanso.app/Contents/MacOS/espanso"
args = ["launcher"]
run_at_load = true
stdout_path = "~/Library/Logs/espanso/stdout.log"
stderr_path = "~/Library/Logs/espanso/stderr.log"

[bootstrap.macos.launchd.agents."com.megadots.llama-cpp"]
program = "~/.dotfiles/scripts/mise/llama-server-launchd"
run_at_load = true
keep_alive = true
stdout_path = "~/Library/Logs/llama-cpp/stdout.log"
stderr_path = "~/Library/Logs/llama-cpp/stderr.log"

[bootstrap.macos.launchd.agents."com.megadots.sesame-session-indexer"]
program = "~/.dotfiles/mise/config/pi-coding-agent/scripts/sesame-session-indexer"
args = ["watch", "--interval", "30"]
run_at_load = true
keep_alive = true
stdout_path = "~/.cache/sesame-session-indexer.log"
stderr_path = "~/.cache/sesame-session-indexer.log"

[bootstrap.macos.launchd.agents."com.megadots.pi-session-indexer"]
program = "~/.dotfiles/mise/config/pi-coding-agent/scripts/pi-session-indexer"
run_at_load = true
start_interval = 7200
stdout_path = "~/.cache/pi-session-indexer.log"
stderr_path = "~/.cache/pi-session-indexer.log"

