[bootstrap.hooks.pre-dotfiles]
run = "git -C {{config_root}} submodule update --init"

[bootstrap.hooks.post-defaults]
run = "killall Finder SystemUIServer Dock || true"

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

[tasks.bootstrap]
run = [
  "git -C {{config_root}} submodule update --init",
  "brew bundle --file={{config_root}}/Brewfile",
  "pre-commit install --install-hooks",
  "mise run fnox:render",
]

[tasks."fnox:render"]
description = "Render fnox file-shaped secrets (env-vars.sh) to ~/.config/fnox/secrets"
run = "{{config_root}}/mise/scripts/fnox-render-secrets"

[tasks."pi:setup"]
description = "Idempotent pi agent setup: pinned tools, settings merge, pi-acp build, extension seed"
run = "{{config_root}}/mise/config/pi-coding-agent/scripts/setup"

[tasks."helium:1password-trust"]
description = "Trust /Applications/Helium.app in 1Password (browsers.other-trusted-apps in settings.json); quit 1Password first"
run = "{{config_root}}/bin/helium-1password-trust"

