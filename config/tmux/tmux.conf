# vim:ft=tmux

# -- [ general settings ] ------------------------------------------------------

# 25k (was 100k): large scrollback + long uptime triggers macOS-arm64 grid
# corruption crash on copy-mode entry (tmux/tmux#4962); also slows big grids
set -g history-limit 25000
# default-shell set by nix (see home/common/default.nix)
source "~/.local/share/tmux/nix.conf"
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION SSH_HOME WINDOWID XAUTHORITY SSHHOME TMUX GPG_AGENT" # https://github.com/cdown/dotfiles/blob/master/.tmux.conf
# set-option -g default-command "reattach-to-user-namespace -l fish"

set -g default-terminal "tmux-256color" # programs inside tmux see this; outer terminal caps via terminal-overrides

set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",xterm*:RGB"
set -as terminal-overrides ',xterm*:Ss=\E[%p1%d q:Se=\E[2 q'
set -as terminal-overrides ',xterm*:sitm=\E[3m'
set -as terminal-overrides ',xterm*:smxx=\E[9m'
set -as terminal-overrides ',xterm*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',xterm*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -as terminal-features ",xterm*:RGB"
set -ga terminal-features ',xterm*:clipboard:strikethrough:usstyle:RGB'
set -as terminal-features ',xterm*:usstyle'
set -sa terminal-features ',xterm*:RGB'
set -sa terminal-features ',xterm*:clipboard'
set -sa terminal-features ',xterm*:extkeys' # extended keys (CSI u) support
set -as terminal-features ',xterm*:extkeys'
# set -as terminal-features ',xterm-ghostty:extkeys'

#
# # Add colors to underscore/undercurl inside neovim [source: https://github.com/folke/tokyonight.nvim#making-undercurls-work-properly-in-tmux]
# set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"  # underscore colours - needs tmux-3.0

set -gq allow-passthrough on
set extended-keys on # allows for meta, ctrl, opt keys, etc.
set extended-keys-format csi-u # match ghostty's CSI u format for shift+enter, etc.
set -g base-index 1 # 0 by default
set -g renumber-windows on # re-number windows when one is closed
set -g mouse on
set -g assume-paste-time 0            # Disable assume-paste-time, so that iTerm2's "Send Hex Codes" feature works with tmux 2.1. (https://github.com/edruder/maximum-awesome/commit/9e3d07f450ac60ec142c82e8b2ffb2777bf99fb4)
set -g repeat-time 0                  # Allow the arrow key to be used immediately after changing windows
set -sg escape-time 10
set -g focus-events on
set -w -g wrap-search off
set -g detach-on-destroy off
set -g visual-bell off
set -g bell-action none
setw -g pane-base-index 1
setw -g xterm-keys on
setw -g aggressive-resize on          # allows multiple sessions to connect to the same server. only shows the resize border when both sessions are on the same windowe
setw -g monitor-activity on
setw -g visual-activity off
set -g status on
set -g status-interval 3
set -g status-justify left
set -g status-position top
set -g set-titles on
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format "#(tmux-process-name '#{pane_tty}')"
# Title format: session:window:pane:pid process (parseable by Hammerspoon for attention detection)
set -g set-titles-string "#S:#I:#P:#{pane_pid} #(tmux-process-name '#{pane_tty}')"
set -g display-time 1000
set -g display-panes-time 800
setw -g other-pane-height 25
setw -g other-pane-width 80
# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
setw -g mode-keys vi
set -g status-keys emacs

set -g @yank_action "copy-pipe"
set -g @scroll-down-exit-copy-mode "off"

# HOOKS!
# REF: https://tmux-tmux.mintlify.app/configuration/hooks#automatic-logging
# set-hook -g pane-focus-in 'run-shell "tmux-pane-focus --onfocus"'
# set-hook -g window-resized 'display "Window resized"'

# -- [ key bindings ] ----------------------------------------------------------

unbind C-a
unbind C-b
unbind C-space
unbind space
unbind c
unbind g
unbind C-g
unbind C-z
unbind -T copy-mode-vi 'Enter'
unbind C-/
unbind C-d
unbind |
unbind -
unbind s

set -g prefix C-space
bind C-space send-prefix

# = to see current bindings: `tmux list-keys` or <prefix-?>

bind -r C-r \
  set @mode_indicator_custom_prompt "  RELOADING " \; \
  set @mode_indicator_custom_mode_style 'fg=#3c474d,bg=#e67e80,italics' \; \
  source-file "~/.config/tmux/tmux.conf" \; \
  set -u @mode_indicator_custom_prompt \; \
  set -u @mode_indicator_custom_mode_style \; \
  refresh-client \;

bind -T copy-mode-vi "?" command-prompt -ip "search up:" "send -X search-backward-incremental '%%%'"
bind -T copy-mode-vi "/" command-prompt -ip "search down:" "send -X search-forward-incremental '%%%'"
bind v split-window -h -l 45% -c "#{pane_current_path}"
# Cycle vertical split between 1/3, 1/2, 2/3
# bind v run-shell 'pw=#{pane_width}; ww=#{window_width}; r=$((pw * 100 / ww)); if [ $r -lt 40 ]; then tmux resize-pane -x $((ww / 2)); elif [ $r -lt 60 ]; then tmux resize-pane -x $((ww * 2 / 3)); else tmux resize-pane -x $((ww / 3)); fi'
bind -r V run-shell 'pw=#{pane_width}; ww=#{window_width}; r=$((pw * 100 / ww)); if [ $r -lt 40 ]; then tmux resize-pane -x $((ww / 2)); elif [ $r -lt 60 ]; then tmux resize-pane -x $((ww * 2 / 3)); else tmux resize-pane -x $((ww / 3)); fi'

bind s split-window -v -l 45% -c "#{pane_current_path}"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
not_tmux="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|fzf|lazygit)$'"

bind-key -n C-h if-shell "$not_tmux" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$not_tmux" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$not_tmux" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$not_tmux" "send-keys C-l" "select-pane -R"

bind-key -n M-h if-shell "$not_tmux" "send-keys M-h" "resize-pane -L 5"
bind-key -n M-j if-shell "$not_tmux" "send-keys M-j" "resize-pane -D 5"
bind-key -n M-k if-shell "$not_tmux" "send-keys M-k" "resize-pane -U 5"
bind-key -n M-l if-shell "$not_tmux" "send-keys M-l" "resize-pane -R 5"


bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l


bind-key -n S-Enter send-keys Escape "[13;2u" # explicit shift+enter passthrough for pi/Claude Code

# kill the session
  bind -r C-k confirm -p "kill-session #{session_name}? (y/n)" "run-shell 'tmux-kill-session \"#{session_name}\"'"
# kill the window
  bind -r C-x confirm -p "kill-window #{window_name}? (y/n)" "kill-window"
# kill the pane
  bind x confirm -p "kill-pane #{pane_index}? (y/n)" "kill-pane"
# new window
  bind -r C-t new-window -c "#{pane_current_path}"
  bind t new-window -c "#{pane_current_path}"

# bind-key C-j join-pane
# bind-key C-l link-pane

# Reorder windows
bind Left swap-window -t -\; previous-window # move window one position to the left
bind Right swap-window -t +\; next-window # move window one position to the right

bind , command-prompt -p "Rename window '#{window_name}' -> " "rename-window '%%'"
unbind ';'
bind ';' last-window


# Make the current window the first window
bind T swap-window -t 1

# create new session
bind C-c command-prompt -p "  new session ->" "run-shell \"ftm %1\""

# insert file path at cursor (for AI agents like OpenCode/Claude Code)
# bind-key C-a run-shell 'tmux display-popup -E -w 82% -h 80% "tv files | xargs -I {} tmux send-keys -t #{pane_id} @{}"'

# ftm session picker
# TODO: run-shell like the C-a popup?
bind C-Space display-popup -T " sessions " -w "30%" -h "30%" "ftm -p && tmux display-popup -C"

# bind C-s display-popup -w "25%" -h "25%" "export TMUX_POPUP=1 && slck -f; tmux display-popup -C"

# Pinvim ephemeral split.
# Only works from nvim. Route through nvim so visual selections can be sent.
# p / C-p both dispatch gpp to nvim; pi/shell panes are ignored.
bind -r C-p if-shell "$is_vim" "send-keys g p p" "display-message 'pinvim split only works from nvim'"
bind p if-shell "$is_vim" "send-keys g p p" "display-message 'pinvim split only works from nvim'"

# switch to my main specific session if switch-client -l fails..
bind -r C-l run-shell "\
  tmux switch-client -l; \
  if [ $? -eq 0 ]; then \
    tmux refresh-client; \
  else \
    tmux switch-client -t mega; \
    tmux refresh-client; \
  fi; \
"
bind -r C-w display-popup -w "40%" -h "40%" -E "\
    tmux list-windows -F '#{window_index} #{window_name}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-window |\
    cut -d ' ' -f 1 |\
    xargs tmux select-window -t"


bind-key -r C-b copy-mode

# Allows scrolling and selecting in copy-mode
bind -n WheelUpPane   select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane select-pane -t= \;                 send-keys -M
bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down

# FIXME: still needed?
# copy to macOS clipboard
# if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'
# if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'

# # copy to X11 clipboard
# if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
# if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

source "~/.config/tmux/megaforest.tmux.conf"
source "~/.config/tmux/plugins.tmux.conf"

# `/` for quick, interactive searches
bind-key / command-prompt -i -I "#{pane_search_string}" -T search -p "search" {
  copy-mode -e
  send-keys -X search-backward-incremental "%%"
}

bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel

# tmux-fingers now owns prefix+C-f; tmux-copycat/fastcopy no longer used
# bind-key C-f run-shell -b ~/.local/share/tmux/plugins/tmux-fingers/tmux-fingers.tmux

bind-key -T copy-mode-vi y switch-client -T copy-yank

bind-key -T copy-yank y send-keys -X copy-pipe-and-cancel "pbcopy"

# copy to EOL and trim trailing newline, but not leading/trailing whitespace
bind-key -T copy-yank l send-keys -X copy-pipe-end-of-line-and-cancel "tr -d '\\n' | pbcopy"

# copy to EOL and trim trailing newline and trailing/leading whitespace
bind-key -T copy-yank L {
  send -X copy-pipe-end-of-line-and-cancel "tr -d '\\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | pbcopy"
}

# copy line
bind-key -T copy-yank V {
  send -X clear-selection

  # get to the start of the physical line
  send -X start-of-line
  send -X start-of-line

  send -X begin-selection

  # end of physical line
  send -X end-of-line
  send -X end-of-line

  # trim trailing newline from selection
  send -X copy-pipe-and-cancel "tr -d '\\n' | pbcopy"
}

bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "tr -d '\\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | pbcopy"

bind-key -T copy-mode-vi C-a send-keys -X start-of-line
bind-key -T copy-mode-vi C-e send-keys -X end-of-line


# don't cancel selection when double click ends
# works in copy mode too
bind-key -n DoubleClick1Pane {
  select-pane
  copy-mode -M
  send-keys -X select-word
}

# once we are in copy mode, single click to start new selection
bind -T copy-mode-vi MouseDown1Pane {
  select-pane
  send-keys -X clear-selection
}

# triple click to copy entire line
bind-key -n TripleClick1Pane {
  select-pane
  # -M is only valid in mouse mode
  copy-mode -M
  send-keys -X select-line
  send-keys -X copy-pipe-end-of-line-and-cancel "tr -d '\\n' | pbcopy"

  # without the sleep, the message dissapears
  run-shell "sleep 0.1"
  display-message "Copied line to clipboard"
}

# do not cancel selection when dragging ends
# TODO document exactly what is binding these actions
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
unbind -T copy-mode TripleClick1Pane
