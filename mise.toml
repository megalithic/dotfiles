[env]
DOTS = "~/.dotfiles"
CODE = "~/code"
XDG_CONFIG_HOME = "~/.config"
XDG_DATA_HOME = "~/.local/share"
XDG_STATE_HOME = "~/.local/state"
XDG_CACHE_HOME = "~/.cache"
PI_STATE_DIR = "~/.local/state/pi"

[tasks.bootstrap]
description = "Run migration-only setup that mise cannot model declaratively"
run = "scripts/mise/bootstrap-final"

[tasks."apps:install"]
description = "Install Homebrew casks and Mac App Store apps"
run = "scripts/mise/install-apps"

[tasks."fnox:render"]
description = "Render fnox/1Password secrets to legacy file paths"
run = "scripts/mise/render-fnox-files"

[tasks."helium:install"]
description = "Install patched Helium with Widevine into /Applications"
run = "scripts/mise/install-helium"

[tasks."nix:ensure"]
description = "Install or repair Determinate Nix, keeping Nix as project/devenv tool"
run = "scripts/mise/ensure-determinate-nix"

[tasks."pi:setup"]
description = "Link Pi extensions/skills/settings and install Pi helper binaries"
run = "scripts/mise/setup-pi"

[tasks."macos:complex-defaults"]
description = "Apply macOS defaults mise cannot represent yet"
run = "scripts/mise/apply-macos-complex-defaults"

[tasks."dotfiles:preflight"]
description = "Classify current owners of mise dotfile targets without mutating files"
run = "scripts/mise/dotfile-preflight"

[tasks.doctor]
description = "Check mise bootstrap migration state"
run = "scripts/mise/doctor"
